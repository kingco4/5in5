<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Day Six - Mood Color Reader</title>
  <link rel="stylesheet" href="main.css" />
  <link href="https://fonts.googleapis.com/css?family=Lato:400,700&display=swap" rel="stylesheet" />
</head>
<body>
  <ul>
    <li><a href="https://kingco4.github.io/5in5/">HOME</a></li>
    <li><a href="https://kingco4.github.io/5in5/dayone/day_one.html">DAY ONE</a></li>
    <li><a href="https://kingco4.github.io/5in5/day_two/day_two.html">DAY TWO</a></li>
    <li><a href="https://kingco4.github.io/5in5/day_three/day_three.html">DAY THREE</a></li>
    <li><a href="https://kingco4.github.io/5in5/day_four/day_four.html">DAY FOUR</a></li>
    <li><a href="https://kingco4.github.io/5in5/day_five/day_five.html">DAY FIVE</a></li>
    <li><a href="day_six.html">DAY SIX</a></li>
  </ul>

  <main class="app">
    <h1>Mood Color Reader</h1>
    <p class="subtitle">Allow camera access and click analyze to detect your facial expression.</p>

    <section class="camera-wrap">
      <video id="video" autoplay playsinline muted></video>
      <div class="face-guide" aria-hidden="true"></div>
    </section>

    <button id="analyzeBtn" type="button">Analyze Mood</button>

    <section class="results">
      <div id="status" class="status">Loading face model...</div>
      <div id="mood">Mood: waiting...</div>
      <div id="colorText">Color: --</div>
      <div id="confidence">Confidence: --</div>
      <div id="colorSwatch" class="swatch"></div>
    </section>
  </main>

  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <script defer src="mood.js"></script>
</body>
</html>
